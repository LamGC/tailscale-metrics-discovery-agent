version: 2

project_name: tsd
dist: build

git:
  tag_sort: -version:refname

builds:
  - id: tsd
    main: ./cmd/tsd
    binary: tsd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/LamGC/tailscale-metrics-discovery-agent/internal/version.Version={{.Version}}{{if .IsGitDirty}}+dev{{end}}
      - -X github.com/LamGC/tailscale-metrics-discovery-agent/internal/version.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      # macOS does not support 32-bit ARM
      - goos: darwin
        goarch: arm
      # Windows does not support 32-bit ARM in this context
      - goos: windows
        goarch: arm
      # FreeBSD does not support ARM
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "tsd_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md

nfpms:
  - id: packages
    package_name: tsd
    ids:
      - tsd
    vendor: LamGC
    homepage: https://github.com/LamGC/tailscale-metrics-discovery-agent
    maintainer: LamGC
    description: Tailscale-aware Prometheus service discovery agent
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      # systemd service files
      - src: packaging/systemd/tsd-agent.service
        dst: /lib/systemd/system/tsd-agent.service
      - src: packaging/systemd/tsd-central.service
        dst: /lib/systemd/system/tsd-central.service
      # sysvinit scripts
      - src: packaging/sysvinit/tsd-agent
        dst: /etc/init.d/tsd-agent
        file_info:
          mode: 0755
      - src: packaging/sysvinit/tsd-central
        dst: /etc/init.d/tsd-central
        file_info:
          mode: 0755
      # config directory (created empty, configs generated by postinstall)
      - dst: /etc/tsd
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
    overrides:
      deb:
        dependencies:
          - tailscale
        recommends:
          - prometheus
      rpm:
        dependencies:
          - tailscale

checksum:
  name_template: "tsd_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  draft: true
  replace_existing_draft: true
  name_template: "{{.Tag}}"
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^style:'
      - '^test:'
