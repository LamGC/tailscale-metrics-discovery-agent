version: 2

project_name: tsd
dist: build

builds:
  - id: tsd
    main: ./cmd/tsd
    binary: tsd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/LamGC/tailscale-metrics-discovery-agent/internal/version.Version={{.Version}}{{if .IsDirty}}+dev{{end}}
      - -X github.com/LamGC/tailscale-metrics-discovery-agent/internal/version.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      # macOS does not support 32-bit ARM
      - goos: darwin
        goarch: arm
      # Windows does not support 32-bit ARM in this context
      - goos: windows
        goarch: arm
      # FreeBSD does not support ARM
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "tsd_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "tsd_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  draft: true
  replace_existing_draft: true
  name_template: "{{.Tag}}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^style:'
      - '^test:'
